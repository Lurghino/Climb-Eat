<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1419" />
  <meta name="description" content="Low-friction fitness and habit tracker for the new dad routine." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>New Dad Tracker</title>

  <!-- Chart.js from CDN. The service worker caches this exact URL so charts also work offline. -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a212b;
      --surface-2: #232d3a;
      --border: #2d3a48;
      --text: #e8edf2;
      --muted: #8b97a6;
      --blue: #6ba3d6;
      --blue-dim: #324a63;
      --green: #79c99a;
      --green-dim: #355c45;
      --gold: #d4a85c;
      --danger: #d97b6c;
      --radius: 16px;
      --tap: 48px;
      --tabbar-h: 64px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: calc(env(safe-area-inset-top) + 16px) 20px 8px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    header .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    header .brand span { color: var(--green); }
    header .date {
      font-size: 13px;
      color: var(--muted);
    }

    /* Scrollable content above the tab bar */
    main {
      flex: 1;
      padding: 12px 20px calc(var(--tabbar-h) + env(safe-area-inset-bottom) + 28px);
    }

    h2.page-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 6px 0 16px;
    }
    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 22px 0 10px;
      font-weight: 600;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }

    /* Hero */
    .hero {
      border-radius: var(--radius);
      padding: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(160deg, var(--surface-2), var(--surface));
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: var(--accent, var(--green));
    }
    .hero .eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .hero .headline {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
    }
    .hero .body {
      font-size: 16px;
      color: var(--text);
      opacity: 0.92;
      margin: 0;
    }

    /* Status grid on home */
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 4px;
    }
    .status-row + .status-row { border-top: 1px solid var(--border); }
    .status-dot {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: grid; place-items: center;
      flex: 0 0 auto;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-dot.done {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }
    .status-row .label { flex: 1; font-size: 15px; }
    .status-row .value { color: var(--muted); font-size: 15px; }

    /* Buttons */
    .btn {
      width: 100%;
      min-height: var(--tap);
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 18px;
      color: #0f1419;
    }
    .btn-green { background: var(--green); }
    .btn-blue { background: var(--blue); }
    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .btn:active { transform: translateY(1px); }

    .btn-row { display: flex; gap: 12px; margin-top: 16px; }
    .btn-row .btn { flex: 1; }

    /* Toggle rows */
    .toggle {
      width: 100%;
      min-height: 64px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .toggle + .toggle { margin-top: 12px; }
    .toggle .t-label { line-height: 1.3; }
    .toggle .t-sub { display: block; font-size: 13px; color: var(--muted); margin-top: 2px; }
    .switch {
      width: 52px; height: 30px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      position: relative;
      flex: 0 0 auto;
      transition: background .15s, border-color .15s;
    }
    .switch::after {
      content: "";
      position: absolute;
      top: 3px; left: 3px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform .15s, background .15s;
    }
    .toggle.on .switch { background: var(--green-dim); border-color: var(--green); }
    .toggle.on .switch::after { transform: translateX(22px); background: var(--green); }

    /* Inputs */
    .field-label { font-size: 14px; color: var(--muted); margin: 0 0 8px; }
    input[type="number"], input[type="text"], input[type="date"], input[type="time"], select {
      width: 100%;
      min-height: var(--tap);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 18px;
      padding: 0 16px;
      appearance: none;
    }
    input[type="date"] { font-size: 16px; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    select {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16'><path fill='%238b97a6' d='M4 6l4 4 4-4'/></svg>");
      background-repeat: no-repeat;
      background-position: right 16px center;
      padding-right: 42px;
    }
    input:focus, select:focus, button:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    .inline-input { display: flex; gap: 12px; align-items: stretch; }
    .inline-input input { flex: 1; }
    .inline-input .btn { width: auto; flex: 0 0 auto; padding: 0 22px; }

    /* Segmented control */
    .segment {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px;
      gap: 5px;
    }
    .segment button {
      flex: 1;
      min-height: 44px;
      border: none;
      border-radius: 11px;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .segment button.active { color: #0f1419; }
    .segment button.active.green { background: var(--green); }
    .segment button.active.blue { background: var(--blue); }
    .segment button.active.violet { background: #9b8ec9; }
    .segment button.active.amber { background: var(--gold); }

    .week-load { display: flex; align-items: center; justify-content: space-between; padding: 10px 2px; border-top: 1px solid var(--border); }
    .week-load .label { font-size: 15px; }
    .week-load .value { font-weight: 700; font-variant-numeric: tabular-nums; }
    .goal-planned { font-size: 12px; color: var(--blue); margin-left: 8px; font-weight: 600; }

    .segment.wrap { flex-wrap: wrap; }
    .segment.wrap button { flex: 1 0 28%; }

    /* Goal progress bars */
    .goal { padding: 10px 2px; }
    .goal + .goal { border-top: 1px solid var(--border); }
    .goal-top { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 8px; }
    .goal-num { color: var(--muted); font-variant-numeric: tabular-nums; }
    .goal-track { height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
    .goal-fill { height: 100%; border-radius: 999px; transition: width .2s; }

    /* Training form + list */
    .tr-grid { display: flex; gap: 12px; margin-top: 12px; }
    .tr-grid > div { flex: 1; }
    .tr-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 6px;
    }
    .tr-item + .tr-item { border-top: 1px solid var(--border); }
    .tr-item.late { background: rgba(212,168,92,0.06); border-radius: 12px; }
    .tr-kind-dot { width: 12px; height: 12px; border-radius: 50%; flex: 0 0 auto; }
    .tr-main { flex: 1; min-width: 0; }
    .tr-line1 { font-size: 15px; font-weight: 600; }
    .tr-line2 { font-size: 13px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tr-tag {
      font-size: 11px; font-weight: 700; color: var(--gold);
      border: 1px solid var(--gold); border-radius: 999px; padding: 1px 7px; margin-left: 6px;
    }
    .tr-act {
      flex: 0 0 auto; min-height: 40px; padding: 0 12px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 14px; cursor: pointer; text-decoration: none;
    }
    .tr-act.danger { color: var(--danger); border-color: var(--border); padding: 0 12px; }

    /* Stepper */
    .stepper-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 2px; }
    .stepper-row + .stepper-row { border-top: 1px solid var(--border); }
    .stepper { display: flex; align-items: center; gap: 14px; }
    .stepper-val { min-width: 26px; text-align: center; font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* Grade tick counters */
    .grade-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 52px;
      padding: 0 6px;
    }
    .grade-row + .grade-row { border-top: 1px solid var(--border); }
    .grade-row .g-name { width: 36px; font-weight: 700; font-size: 16px; }
    .g-btn {
      width: 44px; height: 44px;
      flex: 0 0 auto;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 12px;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }
    .g-btn:active { transform: translateY(1px); }
    .grade-row .g-count {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
    }
    .grade-row .g-count.active { color: var(--green); font-weight: 700; }

    /* Live session metric */
    .session-stat {
      margin-top: 16px;
      padding: 16px 18px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .session-stat .ss-big { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
    .session-stat .ss-sub { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }
    .session-stat .ss-muted { color: var(--muted); font-size: 15px; }
    .ss-pills { display: flex; gap: 8px; }
    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 13px;
      color: var(--text);
    }

    /* Stars */
    .stars { display: flex; gap: 8px; }
    .star {
      flex: 1;
      min-height: var(--tap);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 24px;
      color: var(--surface-2);
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .star.lit { color: var(--gold); border-color: var(--gold); }
    .star.strength.lit { color: var(--blue); border-color: var(--blue); }

    /* Feedback toast */
    .toast {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: var(--green-dim);
      border: 1px solid var(--green);
      color: var(--green);
      font-size: 14px;
      font-weight: 600;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 28px 12px;
    }

    .chart-wrap {
      position: relative;
      height: 240px;
    }

    /* Progress time navigation */
    .prog-nav {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin: 4px 0 14px;
    }
    .prog-btn {
      width: 48px; height: 44px; flex: 0 0 auto;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); border-radius: 12px; font-size: 16px; cursor: pointer;
    }
    .prog-btn:disabled { opacity: 0.35; }
    .prog-range { font-size: 15px; font-weight: 600; color: var(--text); }
    #progress-stack { touch-action: pan-y; }
    #progress-stack .card + .section-label { margin-top: 22px; }

    .muted-note { color: var(--muted); font-size: 13px; line-height: 1.5; }

    /* Bottom tab bar */
    nav {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 50;
      max-width: 480px;
      margin: 0 auto;
      background: rgba(15, 20, 25, 0.92);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
      display: flex;
    }
    nav a {
      flex: 1;
      min-height: var(--tabbar-h);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      text-decoration: none;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }
    nav a svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    nav a.active { color: var(--green); }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">New<span>Dad</span></div>
      <div class="date" id="header-date"></div>
    </header>

    <main id="view"><!-- rendered by JS --></main>

    <nav id="tabbar">
      <a href="#home" data-route="home">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        Home
      </a>
      <a href="#log" data-route="log">
        <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        Log
      </a>
      <a href="#climb" data-route="climb">
        <svg viewBox="0 0 24 24"><path d="M3 20l5-9 4 5 3-6 6 10z"/></svg>
        Climb
      </a>
      <a href="#plan" data-route="plan">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18"/><path d="M8 2v4"/><path d="M16 2v4"/></svg>
        Plan
      </a>
      <a href="#progress" data-route="progress">
        <svg viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16l4-5 3 3 5-7"/></svg>
        Progress
      </a>
      <a href="#settings" data-route="settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 00-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 00-2-1.2L16 2H8l-.6 2.7a7 7 0 00-2 1.2l-2.3-1-2 3.4 2 1.5A7 7 0 003 12a7 7 0 00.1 1.2l-2 1.5 2 3.4 2.3-1a7 7 0 002 1.2L8 22h8l.6-2.7a7 7 0 002-1.2l2.3 1 2-3.4-2-1.5A7 7 0 0019 12z"/></svg>
        Settings
      </a>
    </nav>
  </div>

  <script>
    "use strict";

    // ---------- Config ----------
    var APP_VERSION = "1.6.0";
    var STORE_KEY = "newdad.v1";
    var GRADES = ["5a", "5b", "5c", "6a", "6b", "6c", "7a", "7b", "7c", "8a"];
    var ROUTES = ["home", "log", "climb", "plan", "progress", "settings"];

    // ---------- State (single localStorage JSON key) ----------
    function baseState() {
      return {
        habits: {},
        weights: [],
        climbs: [],
        trainings: [],
        plans: [],
        goals: { trainingsPerWeek: 2, climbPerWeek: 1 }
      };
    }

    function loadState() {
      try {
        var raw = localStorage.getItem(STORE_KEY);
        if (!raw) return baseState();
        var s = JSON.parse(raw);
        var climbs = migrateClimbs(Array.isArray(s.climbs) ? s.climbs : []);
        climbs.forEach(function (c) { if (!c.createdOn) c.createdOn = c.date; });
        var trainings = Array.isArray(s.trainings) ? s.trainings : [];
        var habits = s.habits || {};
        // Migrate old cardio booleans into training entries (no invented durations).
        trainings = migrateCardio(habits, trainings);
        trainings.forEach(function (t) {
          if (!t.id) t.id = uid();
          if (!t.createdOn) t.createdOn = t.date;
        });
        var goals = s.goals && typeof s.goals === "object" ? s.goals : {};
        // Normalize ritual to a status string: "kept" | "slipped" | null.
        Object.keys(habits).forEach(function (d) {
          var r = habits[d] ? habits[d].ritual : null;
          var status = (r === "kept" || r === true) ? "kept" : (r === "slipped" ? "slipped" : null);
          habits[d] = { ritual: status };
        });
        var plans = Array.isArray(s.plans) ? s.plans : [];
        plans.forEach(function (p) { if (!p.id) p.id = uid(); });
        return {
          habits: habits,
          weights: Array.isArray(s.weights) ? s.weights : [],
          climbs: climbs,
          trainings: trainings,
          plans: plans,
          goals: {
            trainingsPerWeek: goals.trainingsPerWeek != null ? goals.trainingsPerWeek : 2,
            climbPerWeek: goals.climbPerWeek != null ? goals.climbPerWeek : 1
          }
        };
      } catch (e) {
        return baseState();
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    // Convert old per-climb records ({date,type,grade,feeling}) into one
    // aggregated session per day ({date,type,ticks,feeling,strength}).
    function migrateClimbs(arr) {
      var byDate = {};
      arr.forEach(function (r) {
        if (!r || !r.date) return;
        var d = byDate[r.date] || { date: r.date, ticks: {}, types: {}, feelings: [], strengths: [] };
        if (r.ticks && typeof r.ticks === "object") {
          Object.keys(r.ticks).forEach(function (g) { d.ticks[g] = (d.ticks[g] || 0) + r.ticks[g]; });
          if (r.type) d.types[r.type] = true;
        } else if (r.grade) {
          d.ticks[r.grade] = (d.ticks[r.grade] || 0) + 1;
          if (r.type) d.types[r.type] = true;
        }
        if (typeof r.feeling === "number" && r.feeling > 0) d.feelings.push(r.feeling);
        if (typeof r.strength === "number" && r.strength > 0) d.strengths.push(r.strength);
        byDate[r.date] = d;
      });
      return Object.keys(byDate).map(function (date) {
        var d = byDate[date];
        var types = Object.keys(d.types);
        var type = types.length === 0 ? "Bouldering" : (types.length === 1 ? types[0] : "Mixed");
        var avg = function (a) { return a.length ? Math.round(a.reduce(function (s, n) { return s + n; }, 0) / a.length) : 0; };
        return { date: date, type: type, ticks: d.ticks, feeling: avg(d.feelings), strength: avg(d.strengths) };
      });
    }

    // ----- Session metric helpers -----
    function totalTicks(ticks) {
      return Object.keys(ticks || {}).reduce(function (s, g) { return s + ticks[g]; }, 0);
    }
    function maxGradeIndex(ticks) {
      var mx = -1;
      Object.keys(ticks || {}).forEach(function (g) {
        if (ticks[g] > 0) { var i = GRADES.indexOf(g); if (i > mx) mx = i; }
      });
      return mx; // -1 if none
    }
    // Average grade index of the hardest 10 sends (all of them if fewer than 10).
    function sessionGradeIndex(ticks) {
      var list = [];
      Object.keys(ticks || {}).forEach(function (g) {
        var i = GRADES.indexOf(g);
        for (var n = 0; n < ticks[g]; n++) list.push(i);
      });
      if (!list.length) return null;
      list.sort(function (a, b) { return b - a; });
      var top = list.slice(0, 10);
      return top.reduce(function (s, n) { return s + n; }, 0) / top.length;
    }
    // Nearest grade label for a fractional index, e.g. 5.4 -> "6b".
    function gradeLabelFromIndex(idx) {
      if (idx == null) return "\u2014";
      var i = Math.max(0, Math.min(GRADES.length - 1, Math.round(idx)));
      return GRADES[i];
    }
    // Difficulty-weighted grade: every send counts, harder sends weigh more,
    // so more high-grade climbs pull the score up. WEIGHT_POW tunes the bias.
    var WEIGHT_POW = 1; // 0 = plain average, higher = more weight on hard sends
    function weightedGradeIndex(ticks) {
      var num = 0, den = 0;
      Object.keys(ticks || {}).forEach(function (g) {
        var i = GRADES.indexOf(g);
        var n = ticks[g];
        var w = Math.pow(i + 1, WEIGHT_POW);
        num += i * w * n;
        den += w * n;
      });
      return den === 0 ? null : num / den;
    }
    // Daily training load = sum of minutes * intensity for that day's trainings.
    function trainingLoadOn(dateStr) {
      return trainingsOn(dateStr).reduce(function (s, t) {
        var mins = (t.minutes == null || t.minutes === "") ? 0 : t.minutes;
        return s + mins * (t.intensity || 0);
      }, 0);
    }
    function todaysClimb() {
      var k = todayKey();
      return state.climbs.filter(function (c) { return c.date === k; })[0] || null;
    }

    // ----- Trainings config + helpers -----
    var TRAINING_KINDS = ["Gym", "Run", "Swim", "Row", "Bike", "Mobility", "Other"];
    var KIND_COLOR = {
      Gym: "#d4a85c", Run: "#e0876f", Swim: "#5fbecf", Row: "#c98fd0",
      Bike: "#88c06a", Mobility: "#9aa7b5", Other: "#8b97a6"
    };

    function uid() {
      return "t" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    }
    function isBackfilled(entry) {
      return !!(entry && entry.createdOn && entry.createdOn !== entry.date);
    }
    function migrateCardio(habits, trainings) {
      var out = trainings.slice();
      Object.keys(habits || {}).forEach(function (date) {
        var h = habits[date] || {};
        if (h.gym && !h._migrated) {
          out.push({ id: uid(), date: date, createdOn: date, kind: "Gym", minutes: null, intensity: 0, note: "migrated, add details" });
        }
        if (h.runswim && !h._migrated) {
          out.push({ id: uid(), date: date, createdOn: date, kind: "Run", minutes: null, intensity: 0, note: "migrated, add details" });
        }
        // keep only ritual going forward
        habits[date] = { ritual: !!h.ritual, _migrated: true };
      });
      return out;
    }

    function trainingsOn(dateStr) {
      return state.trainings.filter(function (t) { return t.date === dateStr; });
    }
    function climbOn(dateStr) {
      return state.climbs.filter(function (c) { return c.date === dateStr; })[0] || null;
    }

    // ----- Week helpers (Monday start) -----
    function parseYmd(s) {
      var p = s.split("-");
      return new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
    }
    function weekStart(d) {
      var x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      var dow = (x.getDay() + 6) % 7; // Mon=0 .. Sun=6
      x.setDate(x.getDate() - dow);
      return x;
    }
    function inThisWeek(dateStr) {
      var start = weekStart(new Date());
      var end = new Date(start); end.setDate(start.getDate() + 7);
      var d = parseYmd(dateStr);
      return d >= start && d < end;
    }
    function weekProgress() {
      var trainings = state.trainings.filter(function (t) { return inThisWeek(t.date); }).length;
      var climbDays = {};
      state.climbs.forEach(function (c) {
        if (totalTicks(c.ticks) > 0 && inThisWeek(c.date)) climbDays[c.date] = true;
      });
      var plannedTrain = state.plans.filter(function (p) { return p.type === "Training" && inThisWeek(p.date); }).length;
      var plannedClimb = state.plans.filter(function (p) { return p.type === "Climb" && inThisWeek(p.date); }).length;
      return {
        trainings: trainings,
        trainTarget: state.goals.trainingsPerWeek,
        plannedTrain: plannedTrain,
        climbs: Object.keys(climbDays).length,
        climbTarget: state.goals.climbPerWeek,
        plannedClimb: plannedClimb,
        load: weekLoad()
      };
    }
    function weekLoad() {
      return state.trainings.reduce(function (s, t) {
        if (!inThisWeek(t.date)) return s;
        var mins = (t.minutes == null || t.minutes === "") ? 0 : t.minutes;
        return s + mins * (t.intensity || 0);
      }, 0);
    }

    // ----- Ritual helpers (status: "kept" | "slipped" | null) -----
    function ritualStatus(dateStr) {
      var h = state.habits[dateStr];
      return h && h.ritual ? h.ritual : null;
    }
    function setRitual(dateStr, status) {
      if (!state.habits[dateStr]) state.habits[dateStr] = { ritual: null };
      state.habits[dateStr].ritual = status; // null clears
    }
    function addDaysStr(dateStr, delta) {
      var d = parseYmd(dateStr); d.setDate(d.getDate() + delta); return ymd(d);
    }
    function ritualStreak() {
      var d = todayKey();
      var today = ritualStatus(d);
      if (today === "slipped") return 0;
      if (today !== "kept") d = addDaysStr(d, -1); // unlogged today does not break the streak
      var count = 0;
      while (ritualStatus(d) === "kept") { count++; d = addDaysStr(d, -1); }
      return count;
    }

    // ----- Plan helpers -----
    function plansOn(dateStr) {
      return state.plans.filter(function (p) { return p.date === dateStr; });
    }
    function upcomingPlans(daysAhead) {
      var today = todayKey();
      var end = addDaysStr(today, daysAhead);
      return state.plans
        .filter(function (p) { return p.date >= today && p.date <= end; })
        .sort(function (a, b) { return a.date < b.date ? -1 : (a.date > b.date ? 1 : 0); });
    }
    // Has the planned session actually been logged on that day?
    function planFulfilled(p) {
      if (p.type === "Climb") { var c = climbOn(p.date); return !!(c && totalTicks(c.ticks) > 0); }
      return trainingsOn(p.date).length > 0;
    }

    var state = loadState();

    // ---------- Date helpers (local time) ----------
    function todayKey() {
      var d = new Date();
      return ymd(d);
    }
    function ymd(d) {
      var m = String(d.getMonth() + 1).padStart(2, "0");
      var day = String(d.getDate()).padStart(2, "0");
      return d.getFullYear() + "-" + m + "-" + day;
    }
    function prettyDate(d) {
      return d.toLocaleDateString(undefined, { weekday: "short", day: "numeric", month: "short" });
    }
    function currentWeight() {
      if (!state.weights.length) return null;
      var sorted = state.weights.slice().sort(function (a, b) { return a.date < b.date ? -1 : 1; });
      return sorted[sorted.length - 1].weight;
    }

    // ---------- Tiny DOM helpers ----------
    function el(id) { return document.getElementById(id); }
    function esc(s) { return String(s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    }); }

    // ---------- Router ----------
    function currentRoute() {

    function render() {

    }

    // ---------- Page: Home ----------
    function heroContext() {
      var h = new Date().getHours();
      var rs = ritualStatus(todayKey());
      if (h >= 20 && h <= 23 && rs == null) {
        return { accent: "var(--blue)", eyebrow: "Evening", headline: "Evening winding down",
          body: "Time for tea or lemon water? \uD83C\uDF75" };
      }
      if (h >= 6 && h < 12) {
        return { accent: "var(--green)", eyebrow: "Morning", headline: "Start light",
          body: "A glass of water and a few easy breaths. Keep the morning calm and energized." };
      }
      // Neutral glanceable summary
      var tCount = trainingsOn(todayKey()).length;
      var didClimb = !!(climbOn(todayKey()) && totalTicks(climbOn(todayKey()).ticks) > 0);
      var bits = [];
      if (rs === "kept") bits.push("ritual kept");
      if (tCount) bits.push(tCount + (tCount === 1 ? " training" : " trainings"));
      if (didClimb) bits.push("climb logged");
      var w = currentWeight();
      var head = bits.length ? bits.join(", ") : "Nothing logged yet today";
      var body = (w == null ? "No weight on record." : "Latest weight " + w + " kg.") + " Tap Log to update your day.";
      return { accent: "var(--green)", eyebrow: "Today", headline: head.charAt(0).toUpperCase() + head.slice(1),
        body: body };
    }

    function renderHome() {
      var hc = heroContext();
      var rs = ritualStatus(todayKey());
      var streak = ritualStreak();
      var w = currentWeight();
      var tToday = trainingsOn(todayKey());
      var climb = climbOn(todayKey());
      var climbDone = !!(climb && totalTicks(climb.ticks) > 0);
      var wp = weekProgress();
      var streakText = streak > 0 ? "\uD83D\uDD25 " + streak + "d" : "";
      var ritualValue = rs === "kept" ? ("kept" + (streakText ? " \u00B7 " + streakText : ""))
        : (rs === "slipped" ? "slipped" : (streakText ? "open \u00B7 " + streakText : "open"));

      var upcoming = upcomingPlans(7);
      var planHtml = "";
      if (upcoming.length) {
        planHtml = '<div class="section-label">Coming up</div><div class="card">' +
          upcoming.map(function (p) {
            var done = planFulfilled(p);
            var when = (p.date === todayKey()) ? "Today" : shortLabel(p.date);
            return '<div class="status-row">' +
              '<span class="status-dot' + (done ? " done" : "") + '">' + (done ? check() : (p.type === "Climb" ? "\u26F0" : "\u25CF")) + '</span>' +
              '<span class="label">' + esc(p.type) + (p.note ? " \u00B7 " + esc(p.note) : "") + '</span>' +
              '<span class="value">' + esc(when) + (p.time ? " " + esc(p.time) : "") + (done ? " \u2713" : "") + '</span>' +
            '</div>';
          }).join("") + '</div>';
      }

      var view = el("view");
      view.innerHTML =
        '<div class="hero" style="--accent:' + hc.accent + '">' +
          '<div class="eyebrow">' + esc(hc.eyebrow) + '</div>' +
          '<p class="headline">' + esc(hc.headline) + '</p>' +
          '<p class="body">' + esc(hc.body) + '</p>' +
        '</div>' +

        '<div class="section-label">This week</div>' +
        '<div class="card">' +
          goalBar("Trainings", wp.trainings, wp.trainTarget, "var(--green)", wp.plannedTrain) +
          goalBar("Climb sessions", wp.climbs, wp.climbTarget, "var(--blue)", wp.plannedClimb) +
          '<div class="week-load"><span class="label">Training load</span><span class="value">' + wp.load + '</span></div>' +
        '</div>' +

        planHtml +

        '<div class="section-label">Today at a glance</div>' +
        '<div class="card">' +
          statusRow(rs === "kept", "Evening ritual", ritualValue) +
          statusRow(tToday.length > 0, "Trainings", tToday.length ? tToday.length + " logged" : "none") +
          statusRow(climbDone, "Climb session", climbDone ? "\u2248 " + gradeLabelFromIndex(sessionGradeIndex(climb.ticks)) : "none") +
          statusRow(w != null, "Weight", w != null ? esc(w) + " kg" : "not logged") +
        '</div>' +

        '<div class="btn-row">' +
          '<a class="btn btn-green" href="#log">Quick log</a>' +
          '<a class="btn btn-blue" href="#climb">Log climb</a>' +
        '</div>';
    }

    function goalBar(label, value, target, color, planned) {
      target = target || 0;
      var pct = target > 0 ? Math.min(100, Math.round((value / target) * 100)) : 0;
      var hit = target > 0 && value >= target;
      var plannedHint = (planned && value < target) ? '<span class="goal-planned">' + planned + ' planned</span>' : "";
      return '<div class="goal">' +
        '<div class="goal-top"><span>' + esc(label) + plannedHint + '</span>' +
          '<span class="goal-num">' + value + " / " + target + (hit ? " \u2713" : "") + '</span></div>' +
        '<div class="goal-track"><div class="goal-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
      '</div>';
    }

    function statusRow(done, label, value) {
      return '<div class="status-row">' +
        '<span class="status-dot' + (done ? " done" : "") + '">' + (done ? check() : "\u2014") + '</span>' +
        '<span class="label">' + esc(label) + '</span>' +
        '<span class="value">' + esc(value) + '</span>' +
      '</div>';
    }
    function check() {
      return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>';
    }

    // ---------- Page: Quick Log ----------
    var trainingEdit = null; // id being edited, or null
    var trainingForm = { kind: "Row", minutes: "", intensity: 0, note: "", date: "" };
    var planForm = { type: "Training", date: "", time: "", note: "" };

      view.innerHTML =
        '<h2 class="page-title">Quick log</h2>' +

        '<div class="segment" id="ritual-seg">' +

      // Prefill weight

      paintStars("tr-intensity", trainingForm.intensity);
      renderTrainingList();

      var ritBtns = document.querySelectorAll("#ritual-seg button");

      el("weight-btn").addEventListener("click", function () {
        var v = parseFloat(el("weight-input").value);
        if (isNaN(v) || v <= 0) { showToast("log-toast", "Enter a weight in kg first.", true); return; }
        v = Math.round(v * 10) / 10;
        var key = todayKey();
        state.weights = state.weights.filter(function (x) { return x.date !== key; });
        state.weights.push({ date: key, weight: v });
        saveState();
        showToast("log-toast", "Logged " + v + " kg for today.");

      var kindBtns = document.querySelectorAll("#tr-kind button");
      for (var i = 0; i < kindBtns.length; i++) {
        kindBtns[i].addEventListener("click", function () {

      el("tr-date").addEventListener("change", function () { trainingForm.date = this.value || todayKey(); });
      el("tr-note").addEventListener("input", function () { trainingForm.note = this.value; });

      var iStars = document.querySelectorAll("#tr-intensity .star");
      for (var j = 0; j < iStars.length; j++) {
        iStars[j].addEventListener("click", function () {

    // ---------- Page: Plan ----------
    function renderPlan() {

      view.innerHTML =
        '<h2 class="page-title">Plan</h2>' +

        '<div class="card">' +

    function paintRitualSeg() {
      var cur = ritualStatus(todayKey());

        var v = btns[i].getAttribute("data-rit");

      state.plans.push({ id: uid(), date: date, type: planForm.type, time: planForm.time || "", note: planForm.note.trim() });

    // Google Calendar template link (the phone calendar handles the reminder).
    function gcalUrl(p) {
      var label = p.type === "Climb" ? "Climb session" : "Training";
      if (p.note) label += " (" + p.note + ")";
      var start, end, dates;
      if (p.time && /^\d{2}:\d{2}$/.test(p.time)) {
        var hm = p.time.replace(":", "") + "00";
        var d = p.date.replace(/-/g, "");
        var endH = String(Math.min(23, parseInt(p.time.slice(0, 2), 10) + 1)).padStart(2, "0");
        dates = d + "T" + hm + "/" + d + "T" + endH + p.time.slice(3) + "00";
      } else {
        var d0 = p.date.replace(/-/g, "");
        var d1 = addDaysStr(p.date, 1).replace(/-/g, "");
        dates = d0 + "/" + d1; // all-day
      }
      return "https://calendar.google.com/calendar/render?action=TEMPLATE" +
        "&text=" + encodeURIComponent(label) +
        "&dates=" + dates +
        "&details=" + encodeURIComponent("Planned in New Dad Tracker");
    }

    function renderPlanList() {
      var node = el("plan-list");
      var upcoming = state.plans.slice()
        .filter(function (p) { return p.date >= todayKey(); })
        .sort(function (a, b) { return a.date < b.date ? -1 : (a.date > b.date ? 1 : 0); });
      if (!upcoming.length) { node.innerHTML = '<p class="empty">No upcoming plans.</p>'; return; }
      node.innerHTML = upcoming.map(function (p) {
        var done = planFulfilled(p);
        var when = (p.date === todayKey()) ? "Today" : shortLabel(p.date);
        var color = p.type === "Climb" ? "#6ba3d6" : "#79c99a";
        return '<div class="tr-item">' +
          '<span class="tr-kind-dot" style="background:' + color + '"></span>' +
          '<div class="tr-main">' +
            '<div class="tr-line1">' + esc(p.type) + (done ? ' <span class="tr-tag" style="color:var(--green);border-color:var(--green)">done</span>' : '') + '</div>' +
            '<div class="tr-line2">' + esc(when) + (p.time ? " " + esc(p.time) : "") + (p.note ? " \u00B7 " + esc(p.note) : "") + '</div>' +
          '</div>' +
          '<a class="tr-act" href="' + gcalUrl(p) + '" target="_blank" rel="noopener" aria-label="add to calendar">\uD83D\uDCC5</a>' +
          '<button class="tr-act danger" data-delplan="' + p.id + '" aria-label="delete">\u2715</button>' +
        '</div>';
      }).join("");
      node.querySelectorAll("[data-delplan]").forEach(function (b) {
        b.addEventListener("click", function () {
          var id = this.getAttribute("data-delplan");
          state.plans = state.plans.filter(function (x) { return x.id !== id; });
          saveState();
          renderPlanList();
        });
      });
    }

    function paintKind() {
      var btns = document.querySelectorAll("#tr-kind button");
      for (var i = 0; i < btns.length; i++) {
        var active = btns[i].getAttribute("data-kind") === trainingForm.kind;
        btns[i].classList.toggle("active", active);
        btns[i].style.background = active ? (KIND_COLOR[trainingForm.kind] || "var(--green)") : "";
        btns[i].style.color = active ? "#0f1419" : "";
      }
    }

    function resetTrainingForm() {
      trainingEdit = null;
      trainingForm = { kind: "Row", minutes: "", intensity: 0, note: "", date: todayKey() };
    }

    function saveTraining() {
      var mins = trainingForm.minutes === "" ? null : Math.max(0, parseInt(trainingForm.minutes, 10) || 0);
      var date = trainingForm.date || todayKey();
      if (trainingEdit) {
        var t = state.trainings.filter(function (x) { return x.id === trainingEdit; })[0];
        if (t) {
          t.kind = trainingForm.kind; t.minutes = mins; t.intensity = trainingForm.intensity;
          t.note = trainingForm.note.trim(); t.date = date;
        }
        saveState();
        resetTrainingForm();
        renderLog();
        showToast("tr-toast", "Training updated.");
      } else {
        state.trainings.push({
          id: uid(), date: date, createdOn: todayKey(),
          kind: trainingForm.kind, minutes: mins,
          intensity: trainingForm.intensity, note: trainingForm.note.trim()
        });
        saveState();
        var late = date !== todayKey();
        resetTrainingForm();
        renderLog();
        showToast("tr-toast", "Training added" + (late ? " for " + date + " (backfilled)." : "."));
      }
    }

    function renderTrainingList() {
      var node = el("tr-list");
      if (!state.trainings.length) { node.innerHTML = '<p class="empty">No trainings logged yet.</p>'; return; }
      var sorted = state.trainings.slice().sort(function (a, b) {
        return a.date < b.date ? 1 : (a.date > b.date ? -1 : 0);
      }).slice(0, 12);
      node.innerHTML = sorted.map(function (t) {
        var late = isBackfilled(t);
        var mins = (t.minutes == null || t.minutes === "") ? "\u2014" : t.minutes + " min";
        var dots = "\u25CF".repeat(t.intensity || 0) || "\u2014";
        return '<div class="tr-item' + (late ? " late" : "") + '">' +
          '<span class="tr-kind-dot" style="background:' + (KIND_COLOR[t.kind] || "#8b97a6") + '"></span>' +
          '<div class="tr-main">' +
            '<div class="tr-line1">' + esc(t.kind) + ' \u00B7 ' + mins +
              (late ? ' <span class="tr-tag">added later</span>' : '') + '</div>' +
            '<div class="tr-line2">' + esc(t.date) + ' \u00B7 intensity ' + esc(dots) +
              (t.note ? ' \u00B7 ' + esc(t.note) : '') + '</div>' +
          '</div>' +
          '<button class="tr-act" data-edit="' + t.id + '" aria-label="edit">Edit</button>' +
          '<button class="tr-act danger" data-del="' + t.id + '" aria-label="delete">\u2715</button>' +
        '</div>';
      }).join("");

      var editBtns = node.querySelectorAll("[data-edit]");
      for (var i = 0; i < editBtns.length; i++) {
        editBtns[i].addEventListener("click", function () {
          var id = this.getAttribute("data-edit");
          var t = state.trainings.filter(function (x) { return x.id === id; })[0];
          if (!t) return;
          trainingEdit = id;
          trainingForm = {
            kind: t.kind, minutes: (t.minutes == null ? "" : String(t.minutes)),
            intensity: t.intensity || 0, note: t.note || "", date: t.date
          };
          renderLog();
          window.scrollTo(0, 0);
        });
      }
      var delBtns = node.querySelectorAll("[data-del]");
      for (var j = 0; j < delBtns.length; j++) {
        delBtns[j].addEventListener("click", function () {
          var id = this.getAttribute("data-del");
          state.trainings = state.trainings.filter(function (x) { return x.id !== id; });
          saveState();
          renderTrainingList();
        });
      }
    }

    // ---------- Page: Climbing ----------
    // One aggregated session per day. climbForm holds the working day.
    var climbDate = "";
    var climbForm = { type: "Bouldering", ticks: {}, feeling: 0, strength: 0 };

    function loadClimbFormForDate(dateStr) {
      var existing = climbOn(dateStr);
      if (existing) {
        climbForm = {
          type: existing.type || "Bouldering",
          ticks: Object.assign({}, existing.ticks || {}),
          feeling: existing.feeling || 0,
          strength: existing.strength || 0
        };
      } else {
        climbForm = { type: "Bouldering", ticks: {}, feeling: 0, strength: 0 };
      }
    }

    function renderClimb() {
      if (!climbDate) climbDate = todayKey();
      loadClimbFormForDate(climbDate);
      var existing = climbOn(climbDate);
      var editing = !!existing;
      var isPast = climbDate !== todayKey();
      var view = el("view");
      view.innerHTML =
        '<h2 class="page-title">Climbing session</h2>' +

        '<div class="section-label">Date</div>' +
        '<input type="date" id="climb-date" max="' + todayKey() + '" />' +
        (editing ? '<p class="field-label">A session exists for this day. Saving updates it.</p>'
                 : (isPast ? '<p class="field-label">Logging for a past day (backfilled).</p>' : '')) +

        '<div class="section-label">Type</div>' +
        '<div class="segment" id="climb-type">' +
          '<button data-type="Bouldering">Bouldering</button>' +
          '<button data-type="Ropes">Ropes</button>' +
          '<button data-type="Mixed">Mixed</button>' +
        '</div>' +

        '<div class="section-label">Sends by grade</div>' +
        '<div id="grade-rows">' + GRADES.map(function (g) {
          return '<div class="grade-row">' +
            '<span class="g-name">' + g + '</span>' +
            '<button class="g-btn" data-g="' + g + '" data-dir="-1" aria-label="one fewer ' + g + '">\u2212</button>' +
            '<span class="g-count" id="gc-' + g + '">0</span>' +
            '<button class="g-btn" data-g="' + g + '" data-dir="1" aria-label="one more ' + g + '">+</button>' +
          '</div>';
        }).join("") + '</div>' +

        '<div class="session-stat" id="session-stat"></div>' +

        '<div class="section-label">Feeling of lightness / energy</div>' +
        '<div class="stars" id="climb-feeling">' +
          [1, 2, 3, 4, 5].map(function (n) {
            return '<button class="star" data-n="' + n + '">\u2605</button>';
          }).join("") +
        '</div>' +

        '<div class="section-label">Strength</div>' +
        '<div class="stars" id="climb-strength">' +
          [1, 2, 3, 4, 5].map(function (n) {
            return '<button class="star strength" data-n="' + n + '">\u2605</button>';
          }).join("") +
        '</div>' +

        '<div style="margin-top:20px"><button class="btn btn-green" id="climb-save">' +
          (editing ? "Update session" : "Save session") + '</button></div>' +
        '<div id="climb-toast"></div>';

      el("climb-date").value = climbDate;
      paintType();
      paintCounts();
      paintSessionStat();
      paintStars("climb-feeling", climbForm.feeling);
      paintStars("climb-strength", climbForm.strength);

      el("climb-date").addEventListener("change", function () {
        climbDate = this.value || todayKey();
        renderClimb();
      });

      var typeBtns = document.querySelectorAll("#climb-type button");
      for (var i = 0; i < typeBtns.length; i++) {
        typeBtns[i].addEventListener("click", function () {
          climbForm.type = this.getAttribute("data-type");
          paintType();
        });
      }

      var gBtns = document.querySelectorAll("#grade-rows .g-btn");
      for (var k = 0; k < gBtns.length; k++) {
        gBtns[k].addEventListener("click", function () {
          var g = this.getAttribute("data-g");
          var dir = parseInt(this.getAttribute("data-dir"), 10);
          var cur = climbForm.ticks[g] || 0;
          cur = Math.max(0, cur + dir);
          if (cur === 0) delete climbForm.ticks[g]; else climbForm.ticks[g] = cur;
          el("gc-" + g).textContent = climbForm.ticks[g] || 0;
          el("gc-" + g).classList.toggle("active", (climbForm.ticks[g] || 0) > 0);
          paintSessionStat();
        });
      }

      wireStars("climb-feeling", "feeling");
      wireStars("climb-strength", "strength");

      el("climb-save").addEventListener("click", function () {
        if (totalTicks(climbForm.ticks) === 0) { showToast("climb-toast", "Add at least one send first.", true); return; }
        if (!climbForm.feeling) { showToast("climb-toast", "Tap a feeling star first.", true); return; }
        var key = climbDate;
        var prev = climbOn(key);
        var created = prev && prev.createdOn ? prev.createdOn : todayKey();
        state.climbs = state.climbs.filter(function (c) { return c.date !== key; });
        state.climbs.push({
          date: key,
          createdOn: created,
          type: climbForm.type,
          ticks: Object.assign({}, climbForm.ticks),
          feeling: climbForm.feeling,
          strength: climbForm.strength
        });
        saveState();
        var sg = gradeLabelFromIndex(sessionGradeIndex(climbForm.ticks));
        var late = key !== created;
        showToast("climb-toast", "Saved " + totalTicks(climbForm.ticks) + " sends, grade \u2248 " + sg +
          (late ? " (backfilled)." : "."));
        renderClimb();
      });
    }

    function paintType() {
      var btns = document.querySelectorAll("#climb-type button");
      for (var i = 0; i < btns.length; i++) {
        var t = btns[i].getAttribute("data-type");
        var active = t === climbForm.type;
        btns[i].classList.toggle("active", active);
        btns[i].classList.toggle("green", active && t === "Bouldering");
        btns[i].classList.toggle("blue", active && t === "Ropes");
        btns[i].classList.toggle("violet", active && t === "Mixed");
      }
    }
    function paintCounts() {
      GRADES.forEach(function (g) {
        var n = climbForm.ticks[g] || 0;
        var node = el("gc-" + g);
        if (node) { node.textContent = n; node.classList.toggle("active", n > 0); }
      });
    }
    function paintSessionStat() {
      var total = totalTicks(climbForm.ticks);
      var idx = sessionGradeIndex(climbForm.ticks);
      var mx = maxGradeIndex(climbForm.ticks);
      var node = el("session-stat");
      if (!node) return;
      if (total === 0) { node.innerHTML = '<span class="ss-muted">No sends yet</span>'; return; }
      node.innerHTML =
        '<div><span class="ss-big">\u2248 ' + gradeLabelFromIndex(idx) + '</span><span class="ss-sub">session grade (top 10 avg)</span></div>' +
        '<div class="ss-pills">' +
          '<span class="pill">' + total + ' sends</span>' +
          '<span class="pill">max ' + (mx >= 0 ? GRADES[mx] : "\u2014") + '</span>' +
        '</div>';
    }
    function wireStars(containerId, field) {
      var btns = document.querySelectorAll("#" + containerId + " .star");
      for (var i = 0; i < btns.length; i++) {
        btns[i].addEventListener("click", function () {
          var n = parseInt(this.getAttribute("data-n"), 10);
          // tapping the current value again clears it
          climbForm[field] = (climbForm[field] === n) ? 0 : n;
          paintStars(containerId, climbForm[field]);
        });
      }
    }
    function paintStars(containerId, value) {
      var stars = document.querySelectorAll("#" + containerId + " .star");
      for (var i = 0; i < stars.length; i++) {
        stars[i].classList.toggle("lit", (i + 1) <= value);
      }
    }

    // ---------- Page: Progress (charts) ----------
    var progressCharts = [];
    var PROGRESS_WINDOW = 28;
    var PROGRESS_STEP = 14;
    var progressOffset = 0; // days the window end is shifted back from today

    function destroyCharts() {
      progressCharts.forEach(function (c) { try { c.destroy(); } catch (e) {} });
      progressCharts = [];
    }

    function progressEarliest() {
      var dates = [];
      state.weights.forEach(function (w) { dates.push(w.date); });
      state.climbs.forEach(function (c) { if (totalTicks(c.ticks) > 0) dates.push(c.date); });
      state.trainings.forEach(function (t) { dates.push(t.date); });
      Object.keys(state.habits).forEach(function (d) { if (state.habits[d] && state.habits[d].ritual) dates.push(d); });
      if (!dates.length) return null;
      dates.sort();
      return parseYmd(dates[0]);
    }
    function daysBetween(aStr, bDate) {
      var a = parseYmd(aStr);
      var b = new Date(bDate.getFullYear(), bDate.getMonth(), bDate.getDate());
      return Math.floor((b - a) / 86400000);
    }
    function maxProgressOffset() {
      var e = progressEarliest();
      if (!e) return 0;
      return Math.max(0, daysBetween(ymd(e), new Date()));
    }
    function windowDays() {
      var end = new Date();
      end.setDate(end.getDate() - progressOffset);
      var out = [];
      for (var i = PROGRESS_WINDOW - 1; i >= 0; i--) {
        var d = new Date(end.getFullYear(), end.getMonth(), end.getDate() - i);
        out.push(ymd(d));
      }
      return out;
    }
    function shortLabel(ymdStr) {
      return parseYmd(ymdStr).toLocaleDateString(undefined, { day: "numeric", month: "short" });
    }

    // Force equal axis widths so every stacked chart lines up on x.
    var LEFTW = 52, RIGHTW = 52;
    function lockWidth(w) { return function (scale) { scale.width = w; }; }
    function rightSpacer() {
      return {
        type: "linear", position: "right", min: 0, max: 1,
        grid: { drawOnChartArea: false, drawTicks: false },
        ticks: { display: false }, border: { display: false },
        afterFit: lockWidth(RIGHTW)
      };
    }
    function xScale() {
      return { grid: { color: "#2d3a48" }, ticks: { maxRotation: 0, autoSkip: true, autoSkipPadding: 12 } };
    }
    function mkChart(canvasId, config) {
      var ctx = el(canvasId);
      if (!ctx) return;
      progressCharts.push(new Chart(ctx.getContext("2d"), config));
    }

    function renderProgress() {
      var view = el("view");
      view.innerHTML =
        '<h2 class="page-title">Progress</h2>' +
        '<div class="prog-nav">' +
          '<button class="prog-btn" id="prog-older" aria-label="older">\u25C0</button>' +
          '<span class="prog-range" id="prog-range"></span>' +
          '<button class="prog-btn" id="prog-newer" aria-label="newer">\u25B6</button>' +
        '</div>' +
        '<div id="progress-stack">' +
          '<div class="section-label">All logs</div><div class="card" id="combo-card"></div>' +
          '<div class="section-label">Weight</div><div class="card" id="weight-card"></div>' +
          '<div class="section-label">Training load</div><div class="card" id="load-card"></div>' +
          '<div class="section-label">Climb grade</div><div class="card" id="grade-card"></div>' +
        '</div>';

      var days = windowDays();
      el("prog-range").textContent = shortLabel(days[0]) + " \u2013 " + shortLabel(days[days.length - 1]);
      wireProgressNav();

      if (typeof Chart === "undefined") {
        var msg = '<p class="empty">Charts need one online load to download the chart engine, then they work offline.</p>';
        ["combo-card", "weight-card", "load-card", "grade-card"].forEach(function (id) { el(id).innerHTML = msg; });
        return;
      }

      Chart.defaults.color = "#8b97a6";
      Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;

      var labels = days.map(function (x) { return x.slice(5); });
      var TOP = GRADES.length;
      var colorFor = function (t) { return t === "Bouldering" ? "#79c99a" : (t === "Ropes" ? "#6ba3d6" : "#9b8ec9"); };

      // Per-day arrays over the shared window
      var gradeData = [], gPtBg = [], gPtBorder = [], gPtR = [], climbMeta = [];
      var loadData = [], loadMeta = [], loadBg = [];
      var ritualData = [], ritualBg = [], ritualBorder = [], ritualMeta = [], weightData = [];
      days.forEach(function (day) {
        var c = climbOn(day);
        if (c && totalTicks(c.ticks) > 0) {
          var bf = isBackfilled(c), col = colorFor(c.type);
          gradeData.push(weightedGradeIndex(c.ticks));
          gPtBg.push(bf ? "transparent" : col); gPtBorder.push(col); gPtR.push(4);
          climbMeta.push({ type: c.type, total: totalTicks(c.ticks), max: maxGradeIndex(c.ticks),
            weighted: weightedGradeIndex(c.ticks), top10: sessionGradeIndex(c.ticks),
            feeling: c.feeling || 0, strength: c.strength || 0, backfilled: bf, border: col });
        } else {
          gradeData.push(null); gPtBg.push("transparent"); gPtBorder.push("transparent"); gPtR.push(0); climbMeta.push(null);
        }
        var load = trainingLoadOn(day);
        loadData.push(load); loadMeta.push(trainingsOn(day)); loadBg.push("#6ba3d6");
        var rs = ritualStatus(day);
        if (rs === "kept") { ritualData.push(TOP - 0.4); ritualBg.push("#d4a85c"); ritualBorder.push("#d4a85c"); ritualMeta.push("kept"); }
        else if (rs === "slipped") { ritualData.push(TOP - 0.4); ritualBg.push("transparent"); ritualBorder.push("#8b97a6"); ritualMeta.push("slipped"); }
        else { ritualData.push(null); ritualBg.push("transparent"); ritualBorder.push("transparent"); ritualMeta.push(null); }
        var w = state.weights.filter(function (x) { return x.date === day; })[0];
        weightData.push(w ? w.weight : null);
      });

      // shared metadata
      var everClimb = state.climbs.some(function (c) { return totalTicks(c.ticks) > 0; });
      var everTraining = state.trainings.length > 0;
      var everRitual = Object.keys(state.habits).some(function (d) { return state.habits[d] && state.habits[d].ritual; });      var everWeight = state.weights.length > 0;

      var climbTip = function (ctx) {
        var m = ctx.dataset._meta[ctx.dataIndex];
        if (!m) return null;
        var lines = [
          "Climb grade \u2248 " + gradeLabelFromIndex(m.weighted) + " (weighted)",
          "Top 10 avg \u2248 " + gradeLabelFromIndex(m.top10) + "  \u00B7  max " + (m.max >= 0 ? GRADES[m.max] : "\u2014"),
          m.total + " sends  \u00B7  " + m.type + (m.backfilled ? " (added later)" : "")
        ];
        if (m.feeling) lines.push("Feeling " + m.feeling + "/5");
        if (m.strength) lines.push("Strength " + m.strength + "/5");
        return lines;
      };
      var loadTip = function (ctx) {
        var ts = ctx.dataset._lmeta[ctx.dataIndex] || [];
        if (!ts.length) return null;
        var mins = ts.reduce(function (s, t) { return s + ((t.minutes == null || t.minutes === "") ? 0 : t.minutes); }, 0);
        return "Load " + ctx.parsed.y + " (" + ts.length + (ts.length === 1 ? " training, " : " trainings, ") + mins + " min)";
      };

      // ---- 1. Combined (all logs) ----
      if (!everClimb && !everTraining && !everRitual) {
        el("combo-card").innerHTML = '<p class="empty">Nothing to chart yet. Log climbs, trainings, or the evening ritual.</p>';
      } else {
        el("combo-card").innerHTML =
          '<div class="chart-wrap" style="height:260px"><canvas id="combo-canvas"></canvas></div>' +
          '<p class="muted-note" style="margin-top:8px">Left: weighted climb grade (points by type, hollow = backfilled). Right: daily load (min \u00D7 intensity). Gold dots: ritual kept, grey ring: slipped.</p>';
        mkChart("combo-canvas", {
          type: "line",
          data: { labels: labels, datasets: [
            { label: "Climb grade", yAxisID: "yGrade", data: gradeData, spanGaps: true, borderColor: "#79c99a",
              borderWidth: 2, tension: 0.3, pointRadius: gPtR, pointHoverRadius: gPtR.map(function (r) { return r ? r + 2 : 0; }),
              pointBackgroundColor: gPtBg, pointBorderColor: gPtBorder, pointBorderWidth: 2, _meta: climbMeta },
            { label: "Training load", yAxisID: "yLoad", data: loadData, borderColor: "#6ba3d6",
              backgroundColor: "rgba(107,163,214,0.14)", borderWidth: 2, tension: 0.3, fill: true,
              pointRadius: 0, pointHoverRadius: 4, _lmeta: loadMeta },
            { label: "Evening ritual", yAxisID: "yGrade", data: ritualData, showLine: false, pointStyle: "circle",
              pointRadius: 5, pointHoverRadius: 7, pointBackgroundColor: ritualBg, pointBorderColor: ritualBorder,
              pointBorderWidth: 2, _rmeta: ritualMeta }
          ] },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: { display: true, labels: { usePointStyle: true, boxWidth: 8, padding: 12 } },
              tooltip: { callbacks: { label: function (ctx) {
                if (ctx.dataset.label === "Training load") return loadTip(ctx);
                if (ctx.dataset.label === "Evening ritual") {
                  var rm = ctx.dataset._rmeta[ctx.dataIndex];
                  return rm === "kept" ? "Evening ritual \u2713" : (rm === "slipped" ? "Ritual slipped" : null);
                }
                return climbTip(ctx);
              } } }
            },
            scales: {
              x: xScale(),
              yGrade: { type: "linear", position: "left", min: 0, max: TOP, grid: { color: "#2d3a48" },
                ticks: { stepSize: 1, callback: function (v) { return GRADES[v] || ""; } }, afterFit: lockWidth(LEFTW) },
              yLoad: { type: "linear", position: "right", min: 0, grid: { drawOnChartArea: false },
                ticks: { precision: 0 }, afterFit: lockWidth(RIGHTW) }
            }
          }
        });
      }

      // ---- 2. Weight ----
      if (!everWeight) {
        el("weight-card").innerHTML = '<p class="empty">No weight entries yet.</p>';
      } else {
        el("weight-card").innerHTML = '<div class="chart-wrap" style="height:170px"><canvas id="weight-canvas"></canvas></div>';
        mkChart("weight-canvas", {
          type: "line",
          data: { labels: labels, datasets: [{
            label: "Weight", data: weightData, spanGaps: true, borderColor: "#6ba3d6",
            backgroundColor: "rgba(107,163,214,0.15)", borderWidth: 2, tension: 0.3, fill: true,
            pointRadius: weightData.map(function (v) { return v == null ? 0 : 3; }), pointBackgroundColor: "#6ba3d6"
          }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) {
              return ctx.parsed.y == null ? null : ctx.parsed.y + " kg"; } } } },
            scales: {
              x: xScale(),
              y: { position: "left", grid: { color: "#2d3a48" }, ticks: { callback: function (v) { return v + " kg"; } }, afterFit: lockWidth(LEFTW) },
              yR: rightSpacer()
            }
          }
        });
      }

      // ---- 3. Training load ----
      if (!everTraining) {
        el("load-card").innerHTML = '<p class="empty">No trainings yet.</p>';
      } else {
        el("load-card").innerHTML = '<div class="chart-wrap" style="height:170px"><canvas id="load-canvas"></canvas></div>';
        mkChart("load-canvas", {
          type: "bar",
          data: { labels: labels, datasets: [{
            label: "Load", data: loadData, backgroundColor: "#6ba3d6", borderRadius: 4, _lmeta: loadMeta
          }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) {
              return ctx.parsed.y ? loadTip(ctx) : null; } } } },
            scales: {
              x: xScale(),
              y: { position: "left", min: 0, grid: { color: "#2d3a48" }, ticks: { precision: 0 }, afterFit: lockWidth(LEFTW) },
              yR: rightSpacer()
            }
          }
        });
      }

      // ---- 4. Climb grade ----
      if (!everClimb) {
        el("grade-card").innerHTML = '<p class="empty">No climbing sessions yet.</p>';
      } else {
        el("grade-card").innerHTML = '<div class="chart-wrap" style="height:180px"><canvas id="grade-canvas"></canvas></div>';
        mkChart("grade-canvas", {
          type: "line",
          data: { labels: labels, datasets: [{
            label: "Climb grade", data: gradeData, spanGaps: true, borderColor: "#79c99a", borderWidth: 2, tension: 0.3,
            pointRadius: gPtR, pointHoverRadius: gPtR.map(function (r) { return r ? r + 2 : 0; }),
            pointBackgroundColor: gPtBg, pointBorderColor: gPtBorder, pointBorderWidth: 2, _meta: climbMeta
          }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: climbTip } } },
            scales: {
              x: xScale(),
              y: { position: "left", min: 0, max: GRADES.length - 1, grid: { color: "#2d3a48" },
                ticks: { stepSize: 1, callback: function (v) { return GRADES[v] || ""; } }, afterFit: lockWidth(LEFTW) },
              yR: rightSpacer()
            }
          }
        });
      }
    }

    function wireProgressNav() {
      var older = el("prog-older"), newer = el("prog-newer");
      var maxOff = maxProgressOffset();
      newer.disabled = progressOffset <= 0;
      older.disabled = progressOffset >= maxOff;
      function navTo(delta) {
        progressOffset = Math.max(0, Math.min(maxProgressOffset(), progressOffset + delta));
        renderProgress();
      }
      older.addEventListener("click", function () { navTo(PROGRESS_STEP); });
      newer.addEventListener("click", function () { navTo(-PROGRESS_STEP); });

      // Swipe across the chart stack: drag right = older, drag left = newer.
      var stack = el("progress-stack");
      var sx = 0, sy = 0, tracking = false;
      stack.addEventListener("touchstart", function (e) {
        if (e.touches.length !== 1) { tracking = false; return; }
        tracking = true; sx = e.touches[0].clientX; sy = e.touches[0].clientY;
      }, { passive: true });
      stack.addEventListener("touchend", function (e) {
        if (!tracking) return;
        tracking = false;
        var t = e.changedTouches[0];
        var dx = t.clientX - sx, dy = t.clientY - sy;
        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
          navTo(dx > 0 ? PROGRESS_STEP : -PROGRESS_STEP);
        }
      }, { passive: true });
    }

    // ---------- Page: Settings ----------
    function renderSettings() {
      var view = el("view");
      view.innerHTML =
        '<h2 class="page-title">Settings</h2>' +

        '<div class="section-label">Weekly goals</div>' +
        '<div class="card">' +
          stepperRow("Trainings per week", "goal-train", state.goals.trainingsPerWeek) +
          stepperRow("Climb sessions per week", "goal-climb", state.goals.climbPerWeek) +
        '</div>' +

        '<div class="section-label">About your data</div>' +
        '<div class="card">' +
          '<p class="muted-note">All your data is stored only on this device, in this browser. Nothing is sent anywhere. Removing the app or clearing browser data will erase it.</p>' +
        '</div>' +
        '<div class="section-label">Data</div>' +
        '<button class="btn btn-danger" id="clear-btn">Clear all data</button>' +
        '<div id="settings-toast"></div>' +
        '<div class="section-label">About</div>' +
        '<div class="card"><p class="muted-note">New Dad Tracker, version ' + APP_VERSION + '.</p></div>';

      wireStepper("goal-train", "trainingsPerWeek");
      wireStepper("goal-climb", "climbPerWeek");

        '<div class="section-label">About</div>' +
        '<div class="card"><p class="muted-note">New Dad Tracker, version ' + APP_VERSION + '.</p></div>';

      var armed = false;
      el("clear-btn").addEventListener("click", function () {
        if (!armed) {
          armed = true;
          this.textContent = "Tap again to confirm wipe";
          showToast("settings-toast", "This deletes every entry. Tap the button once more to confirm.", true);
          var self = this;
          setTimeout(function () { armed = false; self.textContent = "Clear all data"; }, 4000);
          return;
        }
        localStorage.removeItem(STORE_KEY);
        state = baseState();
        location.hash = "#home";
        render();
      });
    }

    function stepperRow(label, id, value) {
      return '<div class="stepper-row">' +
        '<span class="label">' + esc(label) + '</span>' +
        '<div class="stepper">' +
          '<button class="g-btn" id="' + id + '-dn" aria-label="decrease">\u2212</button>' +
          '<span class="stepper-val" id="' + id + '-val">' + value + '</span>' +
          '<button class="g-btn" id="' + id + '-up" aria-label="increase">+</button>' +
        '</div>' +
      '</div>';
    }
    function wireStepper(id, goalKey) {
      function bump(delta) {
        var v = Math.max(0, Math.min(14, (state.goals[goalKey] || 0) + delta));
        state.goals[goalKey] = v;
        saveState();
        el(id + "-val").textContent = v;
      }
      el(id + "-dn").addEventListener("click", function () { bump(-1); });
      el(id + "-up").addEventListener("click", function () { bump(1); });
    }

    // ---------- Toast helper ----------
    function showToast(targetId, text, warn) {
      var node = el(targetId);
      if (!node) return;
      node.innerHTML = '<div class="toast"' +
        (warn ? ' style="background:rgba(217,123,108,0.15);border-color:var(--danger);color:var(--danger)"' : "") +
        '>' + esc(text) + '</div>';
    }

    // ---------- Service worker ----------
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () { /* offline-first still works on next loads */ });
      });
    }

    // ---------- Boot ----------
    window.addEventListener("hashchange", render);
    if (!location.hash) location.hash = "#home";
    render();
  </script>
</body>
</html>
