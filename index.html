<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1419" />
  <meta name="description" content="Low-friction fitness and habit tracker for the new dad routine." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>New Dad Tracker</title>

  <!-- Chart.js from CDN. The service worker caches this exact URL so charts also work offline. -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a212b;
      --surface-2: #232d3a;
      --border: #2d3a48;
      --text: #e8edf2;
      --muted: #8b97a6;
      --blue: #6ba3d6;
      --blue-dim: #324a63;
      --green: #79c99a;
      --green-dim: #355c45;
      --gold: #d4a85c;
      --danger: #d97b6c;
      --radius: 16px;
      --tap: 48px;
      --tabbar-h: 64px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: calc(env(safe-area-inset-top) + 16px) 20px 8px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    header .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    header .brand span { color: var(--green); }
    header .date {
      font-size: 13px;
      color: var(--muted);
    }

    /* Scrollable content above the tab bar */
    main {
      flex: 1;
      padding: 12px 20px calc(var(--tabbar-h) + env(safe-area-inset-bottom) + 28px);
    }

    h2.page-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 6px 0 16px;
    }
    .section-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 22px 0 10px;
      font-weight: 600;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }

    /* Hero */
    .hero {
      border-radius: var(--radius);
      padding: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(160deg, var(--surface-2), var(--surface));
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: var(--accent, var(--green));
    }
    .hero .eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .hero .headline {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
    }
    .hero .body {
      font-size: 16px;
      color: var(--text);
      opacity: 0.92;
      margin: 0;
    }

    /* Status grid on home */
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 4px;
    }
    .status-row + .status-row { border-top: 1px solid var(--border); }
    .status-dot {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: grid; place-items: center;
      flex: 0 0 auto;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-dot.done {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }
    .status-row .label { flex: 1; font-size: 15px; }
    .status-row .value { color: var(--muted); font-size: 15px; }

    /* Buttons */
    .btn {
      width: 100%;
      min-height: var(--tap);
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 18px;
      color: #0f1419;
    }
    .btn-green { background: var(--green); }
    .btn-blue { background: var(--blue); }
    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .btn:active { transform: translateY(1px); }

    .btn-row { display: flex; gap: 12px; margin-top: 16px; }
    .btn-row .btn { flex: 1; }

    /* Toggle rows */
    .toggle {
      width: 100%;
      min-height: 64px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .toggle + .toggle { margin-top: 12px; }
    .toggle .t-label { line-height: 1.3; }
    .toggle .t-sub { display: block; font-size: 13px; color: var(--muted); margin-top: 2px; }
    .switch {
      width: 52px; height: 30px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      position: relative;
      flex: 0 0 auto;
      transition: background .15s, border-color .15s;
    }
    .switch::after {
      content: "";
      position: absolute;
      top: 3px; left: 3px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform .15s, background .15s;
    }
    .toggle.on .switch { background: var(--green-dim); border-color: var(--green); }
    .toggle.on .switch::after { transform: translateX(22px); background: var(--green); }

    /* Inputs */
    .field-label { font-size: 14px; color: var(--muted); margin: 0 0 8px; }
    input[type="number"], select {
      width: 100%;
      min-height: var(--tap);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 18px;
      padding: 0 16px;
      appearance: none;
    }
    select {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16'><path fill='%238b97a6' d='M4 6l4 4 4-4'/></svg>");
      background-repeat: no-repeat;
      background-position: right 16px center;
      padding-right: 42px;
    }
    input:focus, select:focus, button:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    .inline-input { display: flex; gap: 12px; align-items: stretch; }
    .inline-input input { flex: 1; }
    .inline-input .btn { width: auto; flex: 0 0 auto; padding: 0 22px; }

    /* Segmented control */
    .segment {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px;
      gap: 5px;
    }
    .segment button {
      flex: 1;
      min-height: 44px;
      border: none;
      border-radius: 11px;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .segment button.active { color: #0f1419; }
    .segment button.active.green { background: var(--green); }
    .segment button.active.blue { background: var(--blue); }

    /* Stars */
    .stars { display: flex; gap: 8px; }
    .star {
      flex: 1;
      min-height: var(--tap);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 24px;
      color: var(--surface-2);
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .star.lit { color: var(--gold); border-color: var(--gold); }

    /* Feedback toast */
    .toast {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: var(--green-dim);
      border: 1px solid var(--green);
      color: var(--green);
      font-size: 14px;
      font-weight: 600;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 28px 12px;
    }

    .chart-wrap {
      position: relative;
      height: 240px;
    }

    .muted-note { color: var(--muted); font-size: 13px; line-height: 1.5; }

    /* Bottom tab bar */
    nav {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 50;
      max-width: 480px;
      margin: 0 auto;
      background: rgba(15, 20, 25, 0.92);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
      display: flex;
    }
    nav a {
      flex: 1;
      min-height: var(--tabbar-h);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      text-decoration: none;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }
    nav a svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    nav a.active { color: var(--green); }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">New<span>Dad</span></div>
      <div class="date" id="header-date"></div>
    </header>

    <main id="view"><!-- rendered by JS --></main>

    <nav id="tabbar">
      <a href="#home" data-route="home">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        Home
      </a>
      <a href="#log" data-route="log">
        <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        Log
      </a>
      <a href="#climb" data-route="climb">
        <svg viewBox="0 0 24 24"><path d="M3 20l5-9 4 5 3-6 6 10z"/></svg>
        Climb
      </a>
      <a href="#progress" data-route="progress">
        <svg viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16l4-5 3 3 5-7"/></svg>
        Progress
      </a>
      <a href="#settings" data-route="settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 00-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 00-2-1.2L16 2H8l-.6 2.7a7 7 0 00-2 1.2l-2.3-1-2 3.4 2 1.5A7 7 0 003 12a7 7 0 00.1 1.2l-2 1.5 2 3.4 2.3-1a7 7 0 002 1.2L8 22h8l.6-2.7a7 7 0 002-1.2l2.3 1 2-3.4-2-1.5A7 7 0 0019 12z"/></svg>
        Settings
      </a>
    </nav>
  </div>

  <script>
    "use strict";

    // ---------- Config ----------
    var APP_VERSION = "1.0.0";
    var STORE_KEY = "newdad.v1";
    var GRADES = ["5a", "5b", "5c", "6a", "6b", "6c", "7a", "7b", "7c", "8a"];
    var ROUTES = ["home", "log", "climb", "progress", "settings"];

    // ---------- State (single localStorage JSON key) ----------
    function baseState() { return { habits: {}, weights: [], climbs: [] }; }

    function loadState() {
      try {
        var raw = localStorage.getItem(STORE_KEY);
        if (!raw) return baseState();
        var s = JSON.parse(raw);
        return {
          habits: s.habits || {},
          weights: Array.isArray(s.weights) ? s.weights : [],
          climbs: Array.isArray(s.climbs) ? s.climbs : []
        };
      } catch (e) {
        return baseState();
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    var state = loadState();

    // ---------- Date helpers (local time) ----------
    function todayKey() {
      var d = new Date();
      return ymd(d);
    }
    function ymd(d) {
      var m = String(d.getMonth() + 1).padStart(2, "0");
      var day = String(d.getDate()).padStart(2, "0");
      return d.getFullYear() + "-" + m + "-" + day;
    }
    function prettyDate(d) {
      return d.toLocaleDateString(undefined, { weekday: "short", day: "numeric", month: "short" });
    }
    function habitToday() {
      var k = todayKey();
      if (!state.habits[k]) state.habits[k] = { ritual: false, gym: false, runswim: false };
      return state.habits[k];
    }
    function currentWeight() {
      if (!state.weights.length) return null;
      var sorted = state.weights.slice().sort(function (a, b) { return a.date < b.date ? -1 : 1; });
      return sorted[sorted.length - 1].weight;
    }

    // ---------- Tiny DOM helpers ----------
    function el(id) { return document.getElementById(id); }
    function esc(s) { return String(s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    }); }

    // ---------- Router ----------
    function currentRoute() {
      var h = (location.hash || "").replace("#", "");
      return ROUTES.indexOf(h) >= 0 ? h : "home";
    }

    function setActiveTab(route) {
      var links = document.querySelectorAll("#tabbar a");
      for (var i = 0; i < links.length; i++) {
        links[i].classList.toggle("active", links[i].getAttribute("data-route") === route);
      }
    }

    function render() {
      var route = currentRoute();
      setActiveTab(route);
      el("header-date").textContent = prettyDate(new Date());
      destroyCharts();
      if (route === "home") renderHome();
      else if (route === "log") renderLog();
      else if (route === "climb") renderClimb();
      else if (route === "progress") renderProgress();
      else if (route === "settings") renderSettings();
      window.scrollTo(0, 0);
    }

    // ---------- Page: Home ----------
    function heroContext() {
      var h = new Date().getHours();
      var ritualDone = habitToday().ritual;
      if (h >= 20 && h <= 23 && !ritualDone) {
        return { accent: "var(--blue)", eyebrow: "Evening", headline: "Evening winding down",
          body: "Time for tea or lemon water? \uD83C\uDF75" };
      }
      if (h >= 6 && h < 12) {
        return { accent: "var(--green)", eyebrow: "Morning", headline: "Start light",
          body: "A glass of water and a few easy breaths. Keep the morning calm and energized." };
      }
      // Neutral glanceable summary
      var ht = habitToday();
      var doneCount = (ht.ritual ? 1 : 0) + (ht.gym ? 1 : 0) + (ht.runswim ? 1 : 0);
      var w = currentWeight();
      var wText = w == null ? "no weight logged yet" : "weight " + w + " kg";
      return { accent: "var(--green)", eyebrow: "Today", headline: doneCount + " of 3 logged",
        body: "Latest " + wText + ". Tap Log to update your day." };
    }

    function renderHome() {
      var hc = heroContext();
      var ht = habitToday();
      var w = currentWeight();
      var view = el("view");
      view.innerHTML =
        '<div class="hero" style="--accent:' + hc.accent + '">' +
          '<div class="eyebrow">' + esc(hc.eyebrow) + '</div>' +
          '<p class="headline">' + esc(hc.headline) + '</p>' +
          '<p class="body">' + esc(hc.body) + '</p>' +
        '</div>' +

        '<div class="section-label">Today at a glance</div>' +
        '<div class="card">' +
          statusRow(ht.ritual, "Evening ritual") +
          statusRow(ht.gym, "15-min gym finisher") +
          statusRow(ht.runswim, "Run / swim") +
          '<div class="status-row">' +
            '<span class="status-dot' + (w != null ? " done" : "") + '">' + (w != null ? check() : "\u2014") + '</span>' +
            '<span class="label">Weight</span>' +
            '<span class="value">' + (w != null ? esc(w) + " kg" : "not logged") + '</span>' +
          '</div>' +
        '</div>' +

        '<div class="btn-row">' +
          '<a class="btn btn-green" href="#log">Quick log</a>' +
          '<a class="btn btn-blue" href="#climb">Log climb</a>' +
        '</div>';
    }

    function statusRow(done, label) {
      return '<div class="status-row">' +
        '<span class="status-dot' + (done ? " done" : "") + '">' + (done ? check() : "\u2014") + '</span>' +
        '<span class="label">' + esc(label) + '</span>' +
        '<span class="value">' + (done ? "done" : "open") + '</span>' +
      '</div>';
    }
    function check() {
      return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>';
    }

    // ---------- Page: Quick Log ----------
    function renderLog() {
      var ht = habitToday();
      var view = el("view");
      view.innerHTML =
        '<h2 class="page-title">Quick log</h2>' +

        '<div class="section-label">Daily habit</div>' +
        toggleHtml("t-ritual", ht.ritual, "Evening ritual complete", "Tea or lemon water instead of sweets") +

        '<div class="section-label">Cardio</div>' +
        toggleHtml("t-gym", ht.gym, "15-min gym finisher", null) +
        toggleHtml("t-runswim", ht.runswim, "Run (Amager Beach) / swim", null) +

        '<div class="section-label">Weight</div>' +
        '<p class="field-label">One entry per day. Logging again overwrites today.</p>' +
        '<div class="inline-input">' +
          '<input type="number" id="weight-input" inputmode="decimal" step="0.1" min="0" placeholder="kg" />' +
          '<button class="btn btn-green" id="weight-btn">Log</button>' +
        '</div>' +
        '<div id="log-toast"></div>';

      // Prefill today's weight if present
      var t = todayKey();
      var todays = state.weights.filter(function (x) { return x.date === t; })[0];
      if (todays) el("weight-input").value = todays.weight;

      wireToggle("t-ritual", "ritual");
      wireToggle("t-gym", "gym");
      wireToggle("t-runswim", "runswim");

      el("weight-btn").addEventListener("click", function () {
        var v = parseFloat(el("weight-input").value);
        if (isNaN(v) || v <= 0) { showToast("log-toast", "Enter a weight in kg first.", true); return; }
        v = Math.round(v * 10) / 10;
        var key = todayKey();
        state.weights = state.weights.filter(function (x) { return x.date !== key; });
        state.weights.push({ date: key, weight: v });
        saveState();
        showToast("log-toast", "Logged " + v + " kg for today.");
      });
    }

    function toggleHtml(id, on, label, sub) {
      return '<button class="toggle' + (on ? " on" : "") + '" id="' + id + '" role="switch" aria-checked="' + on + '">' +
        '<span class="t-label">' + esc(label) + (sub ? '<span class="t-sub">' + esc(sub) + '</span>' : "") + '</span>' +
        '<span class="switch" aria-hidden="true"></span>' +
      '</button>';
    }

    function wireToggle(id, field) {
      var node = el(id);
      node.addEventListener("click", function () {
        var ht = habitToday();
        ht[field] = !ht[field];
        saveState();
        node.classList.toggle("on", ht[field]);
        node.setAttribute("aria-checked", String(ht[field]));
      });
    }

    // ---------- Page: Climbing ----------
    var climbForm = { type: "Bouldering", grade: "6a", feeling: 0 };

    function renderClimb() {
      var view = el("view");
      view.innerHTML =
        '<h2 class="page-title">Climbing session</h2>' +

        '<div class="section-label">Type</div>' +
        '<div class="segment" id="climb-type">' +
          '<button data-type="Bouldering">Bouldering</button>' +
          '<button data-type="Ropes">Ropes</button>' +
        '</div>' +

        '<div class="section-label">Max grade</div>' +
        '<select id="climb-grade">' + GRADES.map(function (g) {
          return '<option value="' + g + '">' + g + '</option>';
        }).join("") + '</select>' +

        '<div class="section-label">Feeling of lightness / energy</div>' +
        '<div class="stars" id="climb-stars">' +
          [1, 2, 3, 4, 5].map(function (n) {
            return '<button class="star" data-n="' + n + '">\u2605</button>';
          }).join("") +
        '</div>' +

        '<div style="margin-top:20px"><button class="btn btn-green" id="climb-save">Save session</button></div>' +
        '<div id="climb-toast"></div>';

      el("climb-grade").value = climbForm.grade;
      paintType();
      paintStars();

      var typeBtns = document.querySelectorAll("#climb-type button");
      for (var i = 0; i < typeBtns.length; i++) {
        typeBtns[i].addEventListener("click", function () {
          climbForm.type = this.getAttribute("data-type");
          paintType();
        });
      }
      el("climb-grade").addEventListener("change", function () { climbForm.grade = this.value; });

      var starBtns = document.querySelectorAll("#climb-stars .star");
      for (var j = 0; j < starBtns.length; j++) {
        starBtns[j].addEventListener("click", function () {
          climbForm.feeling = parseInt(this.getAttribute("data-n"), 10);
          paintStars();
        });
      }

      el("climb-save").addEventListener("click", function () {
        if (!climbForm.feeling) { showToast("climb-toast", "Tap a star for how you felt first.", true); return; }
        state.climbs.push({
          date: todayKey(),
          type: climbForm.type,
          grade: climbForm.grade,
          feeling: climbForm.feeling
        });
        saveState();
        showToast("climb-toast", "Saved " + climbForm.type + " session, max " + climbForm.grade + ".");
        climbForm.feeling = 0;
        paintStars();
      });
    }

    function paintType() {
      var btns = document.querySelectorAll("#climb-type button");
      for (var i = 0; i < btns.length; i++) {
        var active = btns[i].getAttribute("data-type") === climbForm.type;
        btns[i].classList.toggle("active", active);
        btns[i].classList.toggle("green", active && climbForm.type === "Bouldering");
        btns[i].classList.toggle("blue", active && climbForm.type === "Ropes");
      }
    }
    function paintStars() {
      var stars = document.querySelectorAll("#climb-stars .star");
      for (var i = 0; i < stars.length; i++) {
        stars[i].classList.toggle("lit", (i + 1) <= climbForm.feeling);
      }
    }

    // ---------- Page: Progress (charts) ----------
    var weightChart = null;
    var climbChart = null;

    function destroyCharts() {
      if (weightChart) { weightChart.destroy(); weightChart = null; }
      if (climbChart) { climbChart.destroy(); climbChart = null; }
    }

    function renderProgress() {
      var view = el("view");
      view.innerHTML =
        '<h2 class="page-title">Progress</h2>' +
        '<div class="section-label">Weight over time</div>' +
        '<div class="card" id="weight-card"></div>' +
        '<div class="section-label">Max grade per session</div>' +
        '<div class="card" id="climb-card"></div>';

      if (typeof Chart === "undefined") {
        var msg = '<p class="empty">Charts need one online load to download the chart engine. Open the app once with a connection, then they work offline.</p>';
        el("weight-card").innerHTML = msg;
        el("climb-card").innerHTML = msg;
        return;
      }

      Chart.defaults.color = "#8b97a6";
      Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;

      // Weight line chart
      if (!state.weights.length) {
        el("weight-card").innerHTML = '<p class="empty">No weight entries yet. Log one on the Log tab.</p>';
      } else {
        var wsorted = state.weights.slice().sort(function (a, b) { return a.date < b.date ? -1 : 1; });
        el("weight-card").innerHTML = '<div class="chart-wrap"><canvas id="weight-canvas"></canvas></div>';
        weightChart = new Chart(el("weight-canvas").getContext("2d"), {
          type: "line",
          data: {
            labels: wsorted.map(function (x) { return x.date.slice(5); }),
            datasets: [{
              label: "Weight (kg)",
              data: wsorted.map(function (x) { return x.weight; }),
              borderColor: "#6ba3d6",
              backgroundColor: "rgba(107,163,214,0.15)",
              borderWidth: 2,
              tension: 0.3,
              fill: true,
              pointRadius: 3,
              pointBackgroundColor: "#6ba3d6"
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { color: "#2d3a48" } },
              y: { grid: { color: "#2d3a48" }, ticks: { callback: function (v) { return v + " kg"; } } }
            }
          }
        });
      }

      // Climb bar chart
      if (!state.climbs.length) {
        el("climb-card").innerHTML = '<p class="empty">No climbing sessions yet. Add one on the Climb tab.</p>';
      } else {
        var csorted = state.climbs.slice().sort(function (a, b) { return a.date < b.date ? -1 : 1; });
        el("climb-card").innerHTML = '<div class="chart-wrap"><canvas id="climb-canvas"></canvas></div>';
        climbChart = new Chart(el("climb-canvas").getContext("2d"), {
          type: "bar",
          data: {
            labels: csorted.map(function (x, i) { return x.date.slice(5); }),
            datasets: [{
              label: "Max grade",
              data: csorted.map(function (x) { return GRADES.indexOf(x.grade); }),
              backgroundColor: csorted.map(function (x) {
                return x.type === "Bouldering" ? "#79c99a" : "#6ba3d6";
              }),
              borderRadius: 6,
              _types: csorted.map(function (x) { return x.type; })
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function (ctx) {
                    var g = GRADES[ctx.parsed.y] || "";
                    var t = ctx.dataset._types[ctx.dataIndex] || "";
                    return g + "  \u00B7  " + t;
                  }
                }
              }
            },
            scales: {
              x: { grid: { color: "#2d3a48" } },
              y: {
                min: 0, max: GRADES.length - 1,
                grid: { color: "#2d3a48" },
                ticks: { stepSize: 1, callback: function (v) { return GRADES[v] || ""; } }
              }
            }
          }
        });
      }
    }

    // ---------- Page: Settings ----------
    function renderSettings() {
      var view = el("view");
      view.innerHTML =
        '<h2 class="page-title">Settings</h2>' +
        '<div class="card">' +
          '<p class="muted-note">All your data is stored only on this device, in this browser. Nothing is sent anywhere. Removing the app or clearing browser data will erase it.</p>' +
        '</div>' +
        '<div class="section-label">Data</div>' +
        '<button class="btn btn-danger" id="clear-btn">Clear all data</button>' +
        '<div id="settings-toast"></div>' +
        '<div class="section-label">About</div>' +
        '<div class="card"><p class="muted-note">New Dad Tracker, version ' + APP_VERSION + '.</p></div>';

      var armed = false;
      el("clear-btn").addEventListener("click", function () {
        if (!armed) {
          armed = true;
          this.textContent = "Tap again to confirm wipe";
          showToast("settings-toast", "This deletes every entry. Tap the button once more to confirm.", true);
          var self = this;
          setTimeout(function () { armed = false; self.textContent = "Clear all data"; }, 4000);
          return;
        }
        localStorage.removeItem(STORE_KEY);
        state = baseState();
        location.hash = "#home";
        render();
      });
    }

    // ---------- Toast helper ----------
    function showToast(targetId, text, warn) {
      var node = el(targetId);
      if (!node) return;
      node.innerHTML = '<div class="toast"' +
        (warn ? ' style="background:rgba(217,123,108,0.15);border-color:var(--danger);color:var(--danger)"' : "") +
        '>' + esc(text) + '</div>';
    }

    // ---------- Service worker ----------
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () { /* offline-first still works on next loads */ });
      });
    }

    // ---------- Boot ----------
    window.addEventListener("hashchange", render);
    if (!location.hash) location.hash = "#home";
    render();
  </script>
</body>
</html>
